# Simple deployment using HTTP for model sharing - No ReadWriteMany needed!

# --- 1. ConfigMaps ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: latency-predictor-config
  namespace: default
data:
    LATENCY_RETRAINING_INTERVAL_SEC: "10"
    LATENCY_MIN_SAMPLES_FOR_RETRAIN: "100"
    LATENCY_TTFT_MODEL_PATH: "/models/ttft.joblib"
    LATENCY_TPOT_MODEL_PATH: "/models/tpot.joblib"
    LATENCY_TTFT_SCALER_PATH: "/models/ttft_scaler.joblib"
    LATENCY_TPOT_SCALER_PATH: "/models/tpot_scaler.joblib"
    LATENCY_MODEL_TYPE: "xgboost"
    LATENCY_MAX_TRAINING_DATA_SIZE_PER_BUCKET: "500"
    LATENCY_OBJECTIVE_TYPE: "mean"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prediction-server-config
  namespace: default
data:
  MODEL_SYNC_INTERVAL_SEC: "10"  # Download models every 5 seconds
  LATENCY_MODEL_TYPE: "xgboost"
  PREDICT_HOST: "0.0.0.0"
  PREDICT_PORT: "8001"
  TRAINING_SERVER_URL: "http://training-service:8000"
  LOCAL_TTFT_MODEL_PATH: "/local_models/ttft.joblib"
  LOCAL_TPOT_MODEL_PATH: "/local_models/tpot.joblib"
  LOCAL_TTFT_SCALER_PATH: "/local_models/ttft_scaler.joblib"
  LOCAL_TPOT_SCALER_PATH: "/local_models/tpot_scaler.joblib"
  UVICORN_WORKERS: "56"
  OMP_NUM_THREADS: "1"
  LATENCY_OBJECTIVE_TYPE: "mean"
  MODEL_SYNC_INTERVAL_SEC: "30"

---
# --- 3. Persistent Volume Claim (PVC) ---
# Uses the standard GKE storage class (standard-rwo, balanced PD).
# No custom StorageClass needed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-models-pvc
  namespace: default
spec:
  storageClassName:   hyperdisk-balanced-sc #standard-rwo
  accessModes:
    - ReadWriteOnce # Sufficient since only the leader pod writes to the volume.
  resources:
    requests:
      storage: 20Gi
---
# --- 3. Training Server Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-server-deployment
  namespace: default
  labels:
    app: training-server
    component: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-server
      component: training
  template:
    metadata:
      labels:
        app: training-server
        component: training
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: "pool-5"
      containers:
      - name: training-server
        image: us-docker.pkg.dev/kaushikmitra-gke-dev/kaushikmitra-docker-repo/latencypredictor-training-server:latest # TODO Replace with actual image

        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: training-port
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 10
        resources:
          # Increased CPU & memory
          requests:
            cpu: "2"            # was 500m
            memory: "4Gi"           # was 512Mi
            #ephemeral-storage: "50Gi" # new: reserve 5Gi of scratch space
          limits:
            cpu: "4"            # was 1000m
            memory: "8Gi"           # was 1Gi
            #ephemeral-storage: "100Gi" # new: cap at 10Gi of scratch space

        envFrom:
        - configMapRef:
            name: latency-predictor-config
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SERVER_TYPE
          value: "training"
        volumeMounts:
        - name: model-storage
          mountPath: /models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: training-models-pvc

---
# --- 4. Prediction Server Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-server-deployment
  namespace: default
  labels:
    app: prediction-server
    component: prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-server
      component: prediction
  template:
    metadata:
      labels:
        app: prediction-server
        component: prediction
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: "pool-5"
      containers:
      - name: prediction-server
        image: us-docker.pkg.dev/kaushikmitra-gke-dev/kaushikmitra-docker-repo/latencypredictor-prediction-server:latest # TODO Replace with actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: predict-port
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          requests:
            cpu: "8000m"
            memory: "8Gi"
          limits:
            cpu: "28000m"
            memory: "16Gi"
        envFrom:
        - configMapRef:
            name: prediction-server-config
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SERVER_TYPE
          value: "prediction"
        volumeMounts:
        # Only local storage needed - no shared volumes!
        - name: local-model-storage
          mountPath: /local_models
      volumes:
      - name: local-model-storage
        emptyDir: {}  # Each pod gets its own local storage

---
# --- 5. Services ---
apiVersion: v1
kind: Service
metadata:
  name: training-service
  namespace: default
  labels:
    component: training
spec:
  type: ClusterIP
  selector:
    app: training-server
    component: training
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    name: training

---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: default
  labels:
    component: prediction
spec:
  type: LoadBalancer
  selector:
    app: prediction-server
    component: prediction
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8001
    name: prediction

---
# --- 6. Optional: External Training Service ---
apiVersion: v1
kind: Service
metadata:
  name: training-service-external
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: training-server
    component: training
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8000

