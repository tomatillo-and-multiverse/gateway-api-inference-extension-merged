{{- define "inference-extension.config" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}
  namespace: {{ .Release.Namespace }}
data:
  default-plugins.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: {{ .Values.inferenceExtension.metricsDataSource.scheme | default "http" | quote }}
        path: {{ .Values.inferenceExtension.metricsDataSource.path | default "/metrics" | quote }}
        insecureSkipVerify: {{ .Values.inferenceExtension.metricsDataSource.insecureSkipVerify | default true }}
    - type: core-metrics-extractor
    {{- if .Values.inferenceExtension.latencyPredictor.enabled }}
    - type: predicted-latency-producer
    - type: prefix-cache-affinity-filter
      parameters:
        tau: 0.80
    - type: latency-scorer
    - type: weighted-random-picker
    {{- end }}
    schedulingProfiles:
    {{- if .Values.inferenceExtension.latencyPredictor.enabled }}
    - name: default
      plugins:
      - pluginRef: predicted-latency-producer
      - pluginRef: prefix-cache-affinity-filter
      - pluginRef: latency-scorer
        weight: 1
      - pluginRef: weighted-random-picker
    featureGates:
      - prepareDataPlugins
    {{- else }}
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
    {{- end }}
  {{- if (hasKey .Values.inferenceExtension "pluginsCustomConfig") }}
  {{- .Values.inferenceExtension.pluginsCustomConfig | toYaml | nindent 2 }}
  {{- end }}
  
---
{{- if and .Values.inferenceExtension.sidecar.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.inferenceExtension.sidecar.configMap.name }}
  namespace: {{ .Release.Namespace }}
data:
  {{- .Values.inferenceExtension.sidecar.configMap.data | toYaml | nindent 2 }}
{{- end }}
---
{{- if .Values.inferenceExtension.latencyPredictor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}-latency-predictor-training
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := .Values.inferenceExtension.latencyPredictor.trainingServer.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}-latency-predictor-prediction
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := .Values.inferenceExtension.latencyPredictor.predictionServers.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
---
{{- end -}}
